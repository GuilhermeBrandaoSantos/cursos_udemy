<!DOCTYPE html>
<html lang="pt_br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
        <title>Curso de VueJS 2º Módulo</title>
    </head>
    <style>
        #vue_app{display:flex; align-items: center; justify-content: center;}
        #vue_app #app{margin-top: 150px; text-align: center;}        
        #vue_app #app input{margin-bottom: 10px; width: 100%}
        #botao{margin: 0 auto; display: block;}
        .center{text-align: center;}
        p{font-size: 25px;}
    </style>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-md-6 offset-md-3" id="vue_app">
                    <div id="app">                        
                         <button class="btn btn-primary" @click="aumentar">Aumentar</button>
                         <button class="btn btn-primary" @click="contador2++">Outro Aumentar</button>
                         <button class="btn btn-primary" @click="diminuir">Diminuir</button>
                         <p>Contador: {{ contador }} | {{ contador2 }}</p>
                         <p>Resultado: {{ resultado }}</p>                                               
                    </div>
                </div>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
        <script>
            new Vue({
                el: '#app',
                data: {
                    contador: 0,
                    contador2: 0
                },
                computed: {
                    resultado(){
                        console.log('Chamou aqui');
                        
                        return this.contador >=5 ? 'Maior ou igual a 5' : 'Menor que 5'
                    }
                },
                methods: {
                    aumentar(){
                        this.contador++
                    },
                    diminuir(){
                        this.contador--
                    }                    
                }
            });

        </script>
    </body>
</html>
